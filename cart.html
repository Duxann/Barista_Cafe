        <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f4; padding: 40px; }
        .cart-container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; border-bottom: 2px solid #eee; padding: 10px; color: #666; }
        td { padding: 15px 10px; border-bottom: 1px solid #eee; }

        .remove-item { color: #ff4d4d; cursor: pointer; font-weight: bold; border: none; background: none; font-size: 1.1em; }
        .remove-item:hover { color: #cc0000; }

        .cart-footer { margin-top: 30px; display: flex; justify-content: space-between; align-items: center; }
        
        .clear-cart-btn { background-color: #6c757d; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; }
        .clear-cart-btn:hover { background-color: #5a6268; }

        .total-price { font-size: 1.4em; font-weight: bold; color: #333; }
        .checkout-btn { background-color: #007bff; color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .checkout-btn:hover { background-color: #0056b3; }
    </style>
